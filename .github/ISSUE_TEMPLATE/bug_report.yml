name: Bug report
description: Report a problem with the CLI, generated profiles, or output.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include secrets or private workflow content.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include the command and the smallest sanitized workflow snippet that reproduces the issue.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `codex-action-guard version`.
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
