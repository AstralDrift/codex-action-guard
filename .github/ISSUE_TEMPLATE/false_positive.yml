name: False positive
description: Report a finding that should be reduced, clarified, or suppressed by better analysis.
title: "fix: false positive in "
labels: ["false-positive", "rules"]
body:
  - type: markdown
    attributes:
      value: |
        False positives are important bugs for this project. Please sanitize secrets and private repository names.
  - type: input
    id: rule
    attributes:
      label: Rule ID
      placeholder: CODX001
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: Sanitized workflow snippet
      render: yaml
    validations:
      required: true
  - type: textarea
    id: why-safe
    attributes:
      label: Why this is safe
      description: Explain the gate, permission boundary, validation, or other context the rule missed.
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Finding output
      description: Paste the relevant Markdown or JSON finding.
