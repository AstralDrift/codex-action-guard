name: Feature request
description: Suggest a profile, command, output, or project improvement.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What maintainer or security workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should codex-action-guard do?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope notes
      description: Confirm whether this stays inside v0's Codex GitHub Actions scope.
