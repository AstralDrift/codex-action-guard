name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release artifacts
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          commit="${GITHUB_SHA}"
          date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          mkdir -p dist

          platforms=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
            "windows amd64"
            "windows arm64"
          )

          for platform in "${platforms[@]}"; do
            read -r goos goarch <<< "${platform}"
            name="codex-action-guard_${version}_${goos}_${goarch}"
            binary="${name}/codex-action-guard"
            if [[ "${goos}" == "windows" ]]; then
              binary="${binary}.exe"
            fi

            mkdir -p "${name}"
            GOOS="${goos}" GOARCH="${goarch}" CGO_ENABLED=0 go build \
              -trimpath \
              -ldflags "-s -w -X main.version=${version} -X main.commit=${commit} -X main.date=${date}" \
              -o "${binary}" \
              ./cmd/codex-action-guard

            if [[ "${goos}" == "windows" ]]; then
              zip -qr "dist/${name}.zip" "${name}"
            else
              tar -czf "dist/${name}.tar.gz" "${name}"
            fi
            rm -rf "${name}"
          done

          (cd dist && shasum -a 256 * > SHA256SUMS)

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          if gh release view "${version}" >/dev/null 2>&1; then
            gh release upload "${version}" dist/* --clobber
          else
            gh release create "${version}" dist/* --title "${version}" --generate-notes
          fi
