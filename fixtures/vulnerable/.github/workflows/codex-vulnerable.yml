name: Vulnerable Codex workflow examples

on:
  pull_request_target:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

permissions: write-all

jobs:
  pr-body-direct-prompt:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Run Codex with raw PR body
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            Review this pull request body:
            ${{ github.event.pull_request.body }}
          sandbox: read-only

  issue-comment-write-job:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Run Codex from issue comment
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: "Do what this comment asks: ${{ github.event.comment.body }}"
          sandbox: read-only

  job-level-key-with-repo-code:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install repo dependencies
        run: npm install
      - name: Run Codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/review.md
          sandbox: read-only

  privileged-head-checkout:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout PR head in privileged workflow
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Run Codex after privileged checkout
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/review.md
          sandbox: read-only

  unsafe-sandbox:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Run Codex with full access
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: "Summarize this comment: ${{ github.event.comment.body }}"
          sandbox: danger-full-access

  broad-token-codex:
    runs-on: ubuntu-latest
    steps:
      - name: Run Codex with inherited write-all token
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/review.md
          sandbox: read-only

  output-to-shell:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Run Codex without schema
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/review.md
          output-file: codex-output.sh
          sandbox: read-only
      - name: Execute Codex output
        run: bash codex-output.sh

  output-posted-directly:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Run Codex without schema
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/review.md
          sandbox: read-only
      - name: Post Codex output directly
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.run_codex.outputs.final-message }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: process.env.CODEX_FINAL_MESSAGE,
            })

  prompt-file-reference:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Build prompt from comment
        run: |
          echo "${{ github.event.comment.body }}" > generated-prompt.md
      - name: Run Codex with generated prompt
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: generated-prompt.md
          output-schema-file: .github/codex/schemas/review.schema.json
          sandbox: read-only
